<svg width="1280" height="1280" viewBox="0 0 1280 1280" xmlns="http://www.w3.org/2000/svg">
  <!-- banner content lives in the center band y=320..960; render square, crop to 1280x640 -->
  <defs>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .hand  { font-family: "Bradley Hand", "Chalkboard SE", "Comic Sans MS", cursive; }
      .mono  { font-family: "SF Mono", Menlo, monospace; }
    </style>
  </defs>

  <rect width="1280" height="1280" fill="#EFEBF6"/>
  <rect x="22" y="342" width="1236" height="556" rx="30" fill="none" stroke="#C9BFDE" stroke-width="3"/>

  <!-- name -->
  <text x="80" y="466" class="serif" font-size="84" font-weight="700" fill="#22303A" letter-spacing="1">agentgrade</text>

  <!-- tagline -->
  <text x="80" y="528" class="hand" font-size="33" fill="#33414C">the production report card for AI agents</text>
  <path d="M80 544 q180 10 360 0" fill="none" stroke="#B5502F" stroke-width="4" stroke-linecap="round"/>

  <!-- pillars row -->
  <text x="80" y="606" class="hand" font-size="25" fill="#22303A">evaluation · observability · data · orchestration · governance</text>

  <!-- mini verdict card -->
  <rect x="80" y="644" width="600" height="108" rx="18" fill="#FFFFFF" stroke="#B5502F" stroke-width="3.5"/>
  <text x="110" y="690" class="hand" font-size="28" fill="#22303A">VERDICT: <tspan fill="#B5502F" font-weight="700">DEMO-GRADE</tspan></text>
  <text x="110" y="728" class="hand" font-size="19" fill="#7C8A96">every score points to a file + line — no vibes, just proof</text>

  <!-- install chip -->
  <rect x="80" y="782" width="600" height="58" rx="14" fill="#22303A"/>
  <text x="104" y="820" class="mono" font-size="20" fill="#EFEBF6">/plugin marketplace add rohitguta2432/agentgrade</text>

  <!-- right side: grade stamp -->
  <g transform="rotate(-8 1010 640)">
    <circle cx="1010" cy="640" r="138" fill="none" stroke="#B5502F" stroke-width="6"/>
    <circle cx="1010" cy="640" r="121" fill="none" stroke="#B5502F" stroke-width="2.5"/>
    <text x="1010" y="622" text-anchor="middle" class="serif" font-size="48" font-weight="700" fill="#B5502F">WOULD IT</text>
    <text x="1010" y="682" text-anchor="middle" class="serif" font-size="48" font-weight="700" fill="#B5502F">PASS?</text>
  </g>

  <!-- footer -->
  <text x="80" y="878" class="hand" font-size="19" fill="#7C8A96">free · open source · a Claude Code skill · rohitraj.tech</text>
</svg>
